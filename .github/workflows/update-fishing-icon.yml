name: Apply fishing map icon

on:
  push:
    paths:
      - ".github/workflows/update-fishing-icon.yml"

permissions:
  contents: write

jobs:
  update-icon:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the new app icon
        shell: bash
        run: |
          printf '%s' '' | base64 -d > icon-fishing-192.png
          printf '%s' '' | base64 -d > icon-fishing-512.png
          cp icon-fishing-512.png icon-fishing-maskable-512.png
          python - <<'PY'
          from pathlib import Path

          index = Path("index.html")
          text = index.read_text(encoding="utf-8")
          text = text.replace("icon-512.png", "icon-fishing-512.png")
          text = text.replace("manifest.json?v=3", "manifest.json?v=4")
          text = text.replace("icon-192.png", "icon-fishing-192.png")
          index.write_text(text, encoding="utf-8")

          manifest = Path("manifest.json")
          text = manifest.read_text(encoding="utf-8")
          text = text.replace("icon-192.png", "icon-fishing-192.png")
          text = text.replace("icon-512.png", "icon-fishing-512.png")
          text = text.replace("icon-maskable-512.png", "icon-fishing-maskable-512.png")
          manifest.write_text(text, encoding="utf-8")

          worker = Path("sw.js")
          text = worker.read_text(encoding="utf-8")
          text = text.replace('mie-fishing-map-v16', 'mie-fishing-map-v17')
          text = text.replace('manifest.json?v=3', 'manifest.json?v=4')
          text = text.replace('icon-192.png', 'icon-fishing-192.png')
          text = text.replace('icon-512.png', 'icon-fishing-512.png')
          text = text.replace('icon-maskable-512.png', 'icon-fishing-maskable-512.png')
          worker.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/update-fishing-icon.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "アプリアイコンを三重県釣りマップ画像へ変更"
          git push
