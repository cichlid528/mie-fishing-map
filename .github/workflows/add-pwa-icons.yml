name: Add PWA icons

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-pwa-icons.yml

permissions:
  contents: write

jobs:
  add-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PNG icons
        shell: bash
        env:
          ICON_192: 
          ICON_512: 
        run: |
          printf '%s' "$ICON_192" | base64 --decode > icon-192.png
          printf '%s' "$ICON_512" | base64 --decode > icon-512.png
          cp icon-512.png icon-maskable-512.png
      - name: Commit icons
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add icon-192.png icon-512.png icon-maskable-512.png
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Add PWA PNG icons"
          git push
