name: Apply app icon v2

on:
  push:
    paths:
      - ".github/workflows/update-app-icon-v2.yml"

permissions:
  contents: write

jobs:
  update-icon:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install app icon sizes
        shell: bash
        run: |
          printf '%s' '' | base64 -d > icon-v2-1024.png
          python -m pip install --quiet pillow
          python - <<'PY'
          from PIL import Image
          from pathlib import Path
          src = Path("icon-v2-1024.png")
          with Image.open(src) as im:
              im = im.convert("RGB")
              for size in (180, 192, 512):
                  out = im.resize((size, size), Image.Resampling.LANCZOS)
                  colors = 96 if size >= 512 else 64
                  out = out.quantize(colors=colors, method=Image.Quantize.MEDIANCUT, dither=Image.Dither.FLOYDSTEINBERG)
                  out.save(f"icon-v2-{size}.png", format="PNG", optimize=True)
          Path("icon-v2-maskable-512.png").write_bytes(Path("icon-v2-512.png").read_bytes())
          PY
          rm .github/workflows/update-app-icon-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "アプリアイコンを新しい画像へ変更"
          git push
