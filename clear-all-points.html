<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全ポイント削除</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f2f7f4; color: #123; }
    main { width: min(92vw, 560px); background: white; border-radius: 18px; padding: 24px; box-shadow: 0 12px 32px rgba(0,0,0,.12); }
    button, a { display: inline-block; margin-top: 14px; border: 0; border-radius: 999px; padding: 11px 16px; background: #0f6b55; color: white; text-decoration: none; font-weight: 700; }
    p { line-height: 1.7; }
    code { background: #eef5f1; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <main>
    <h1>全ポイント削除</h1>
    <p>このページを開くと、この端末に残っている釣り場ポイント・記録ピン・位置調整データを削除します。</p>
    <p id="status">待機中です。</p>
    <button id="clearButton" type="button">この端末のポイントを削除</button>
    <a href="./?v=v118-clear-all-points">地図へ戻る</a>
  </main>
  <script>
    const keys = [
      "mie-bass-map-v1",
      "mie-bass-catches-v1",
      "mie-bass-custom-spots-v1",
      "mie-fishing-map-position-overrides-v86",
      "mie-gsi-pond-candidates-v116-scanned",
      "mie-fishing-map-points-wiped-v118"
    ];
    async function clearAll() {
      keys.forEach((key) => localStorage.removeItem(key));
      localStorage.setItem("mie-fishing-map-points-wiped-v118", new Date().toISOString());
      if ("caches" in window) {
        const cacheKeys = await caches.keys();
        await Promise.all(cacheKeys.filter((key) => key.startsWith("bass-spot-log-")).map((key) => caches.delete(key)));
      }
      document.getElementById("status").textContent = "削除しました。地図へ戻って確認してください。";
    }
    document.getElementById("clearButton").addEventListener("click", clearAll);
  </script>
</body>
</html>
