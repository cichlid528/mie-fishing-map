<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050706">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="三重県釣りMAP">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>三重県釣りMAP</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQDP4nD8xQV9qVtAkM5M5OgFHJt0f9I="
      crossorigin=""
    >
    <link rel="stylesheet" href="style.css?v=11">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="釣り場リスト">
        <header class="sidebar-header">
          <div>
            <p class="kicker">Mie Fishing Map</p>
            <h1>三重県釣りMAP</h1>
          </div>
          <button id="resetView" class="icon-button" type="button" title="三重県全体に戻す" aria-label="三重県全体に戻す">
            ⌂
          </button>
        </header>

        <section class="controls" aria-label="検索と絞り込み">
          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="池・川・ダム・漁港・港名">
          </label>
          <div class="filter-row" role="group" aria-label="種別フィルター">
            <button class="filter-chip is-active" type="button" data-filter="all">すべて</button>
            <button class="filter-chip" type="button" data-filter="池">池</button>
            <button class="filter-chip" type="button" data-filter="川">川</button>
            <button class="filter-chip" type="button" data-filter="ダム">ダム</button>
            <button class="filter-chip" type="button" data-filter="漁港">漁港</button>
            <button class="filter-chip" type="button" data-filter="港">港</button>
            <button class="filter-chip" type="button" data-filter="マリーナ">マリーナ</button>
          </div>
          <p id="dataStatus" class="data-status" aria-live="polite">地理院地図の名称位置に補正済み</p>
          <div class="list-tabs" role="tablist" aria-label="リスト切り替え">
            <button id="spotTab" class="list-tab is-active" type="button" aria-selected="true">釣り場</button>
            <button id="catchTab" class="list-tab" type="button" aria-selected="false">釣果</button>
          </div>
        </section>

        <section id="spotListHead" class="list-head" aria-label="チェック項目の説明">
          <span>名称</span>
          <span>いる</span>
          <span>いない</span>
          <span>禁止</span>
          <span>駐車</span>
        </section>
        <section id="catchListHead" class="catch-list-head is-hidden" aria-label="釣果項目の説明">
          <span>No.</span>
          <span>場所・内容</span>
        </section>

        <section id="spotList" class="spot-list" aria-label="場所一覧"></section>
        <section id="catchList" class="catch-list is-hidden" aria-label="釣果一覧"></section>

        <footer class="sidebar-footer">
          <span id="visibleCount">0件</span>
          <span>チェックはこの端末に保存</span>
        </footer>
      </aside>

      <section class="map-pane" aria-label="三重県地図">
        <div id="map"></div>
        <button id="mobileListToggle" class="mobile-list-button" type="button" title="場所リスト" aria-label="場所リストを開く" aria-expanded="false">☰</button>
        <div class="map-tools" aria-label="地図操作">
          <button id="installApp" class="install-button is-hidden" type="button" aria-label="アプリをインストール">
            <span class="tool-icon" aria-hidden="true">⇩</span>
            <span class="tool-label">保存</span>
          </button>
          <button id="locateMe" class="gps-button" type="button" aria-pressed="false">
            <span class="tool-icon" aria-hidden="true">⌖</span>
            <span class="tool-label">現在地</span>
          </button>
          <button id="addSpotMode" class="spot-mode-button" type="button" aria-label="釣り場を追加" aria-pressed="false">
            <span class="tool-icon" aria-hidden="true">＋</span>
            <span class="tool-label">釣り場</span>
          </button>
          <button id="addCatchMode" class="catch-mode-button" type="button" aria-label="釣果ピンを追加" aria-pressed="false">
            <span class="tool-icon" aria-hidden="true">◎</span>
            <span class="tool-label">釣果</span>
          </button>
        </div>
        <p id="gpsStatus" class="gps-status" role="status" aria-live="polite"></p>
        <div id="spotCard" class="spot-card" aria-live="polite">
          <p class="spot-card-type">選択中</p>
          <h2>左のリストから場所を選択</h2>
          <p>選んだ場所へ地図が移動します。</p>
        </div>
      </section>
    </main>

    <section id="spotPanel" class="catch-panel" aria-label="釣り場登録" aria-hidden="true">
      <form id="spotForm" class="catch-form">
        <header class="catch-form-header">
          <div>
            <p class="kicker">Fishing Spot</p>
            <h2>釣り場を追加</h2>
          </div>
          <button id="closeSpotPanel" class="icon-button" type="button" title="閉じる" aria-label="閉じる">×</button>
        </header>

        <input id="spotLat" type="hidden">
        <input id="spotLng" type="hidden">

        <div class="form-grid">
          <label>
            <span>名称</span>
            <input id="spotNameInput" type="text" placeholder="例: 未命名の池、〇〇池">
          </label>

          <label>
            <span>種別</span>
            <select id="spotTypeInput">
              <option>池</option>
              <option>川</option>
              <option>ダム</option>
              <option>漁港</option>
              <option>港</option>
              <option>マリーナ</option>
            </select>
          </label>

          <label>
            <span>地名</span>
            <input id="spotAreaInput" type="text" placeholder="例: 津市〇〇町">
          </label>

          <label>
            <span>メモ</span>
            <textarea id="spotMemoInput" rows="2" placeholder="名前がない水辺、進入口、目印など"></textarea>
          </label>
        </div>

        <div class="catch-actions">
          <button id="deleteSpot" class="delete-button" type="button">削除</button>
          <button class="save-button" type="submit">保存</button>
        </div>
      </form>
    </section>

    <section id="catchPanel" class="catch-panel" aria-label="釣果記録" aria-hidden="true">
      <form id="catchForm" class="catch-form">
        <header class="catch-form-header">
          <div>
            <p class="kicker">Catch Log</p>
            <h2>釣果を記録</h2>
          </div>
          <button id="closeCatchPanel" class="icon-button" type="button" title="閉じる" aria-label="閉じる">×</button>
        </header>

        <input id="catchLat" type="hidden">
        <input id="catchLng" type="hidden">

        <div class="form-grid">
          <label>
            <span>釣れた場所</span>
            <select id="catchSpot"></select>
          </label>

          <label>
            <span>日時</span>
            <input id="catchTime" type="datetime-local">
          </label>

          <label>
            <span>何で釣れたか</span>
            <select id="catchBait">
              <option value="">選択してください</option>
              <option>ワーム</option>
              <option>ミノー</option>
              <option>クランクベイト</option>
              <option>スピナーベイト</option>
              <option>バイブレーション</option>
              <option>ラバージグ</option>
              <option>トップウォーター</option>
              <option>その他</option>
            </select>
          </label>

          <label>
            <span>天気</span>
            <select id="catchWeather">
              <option value="">選択してください</option>
              <option>晴れ</option>
              <option>曇り</option>
              <option>雨</option>
              <option>小雨</option>
              <option>強風</option>
              <option>雪</option>
            </select>
          </label>

          <label>
            <span>風</span>
            <select id="catchWind">
              <option value="">選択してください</option>
              <option>無風</option>
              <option>弱い</option>
              <option>普通</option>
              <option>強い</option>
            </select>
          </label>

          <label>
            <span>水の状態</span>
            <select id="catchWater">
              <option value="">選択してください</option>
              <option>クリア</option>
              <option>普通</option>
              <option>濁り</option>
              <option>増水</option>
              <option>減水</option>
            </select>
          </label>

          <label>
            <span>サイズ</span>
            <select id="catchSize">
              <option value="">選択してください</option>
              <option>20cm未満</option>
              <option>20cm台</option>
              <option>30cm台</option>
              <option>40cm台</option>
              <option>50cm以上</option>
              <option>未計測</option>
            </select>
          </label>

          <label class="full-width">
            <span>メモ</span>
            <textarea id="catchMemo" rows="2" placeholder="水深、岸際、反応など"></textarea>
          </label>

          <div class="catch-photo-field">
            <label class="photo-picker" for="catchPhoto">
              <span>釣果写真</span>
              <input id="catchPhoto" type="file" accept="image/*" capture="environment">
            </label>
            <figure id="catchPhotoPreview" class="catch-photo-preview is-hidden">
              <img id="catchPhotoImage" alt="添付する釣果写真">
              <button id="removeCatchPhoto" type="button">写真を外す</button>
            </figure>
            <p id="catchPhotoStatus" class="catch-photo-status" aria-live="polite">写真は圧縮してこの端末に保存します</p>
          </div>
        </div>

        <div class="catch-actions">
          <button id="deleteCatch" class="delete-button" type="button">削除</button>
          <button class="save-button" type="submit">保存</button>
        </div>
      </form>
    </section>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js?v=11"></script>
  </body>
</html>
