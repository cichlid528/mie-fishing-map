<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>キャッシュ削除</title></head>
<body>
<p>三重県釣りマップのキャッシュを削除しています...</p>
<script>
(async () => {
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((reg) => reg.unregister()));
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map((key) => caches.delete(key)));
    }
  } catch (error) {}
  location.replace('./?v=v175-species-condition-fix&cacheBust=' + Date.now());
})();
</script>
</body>
</html>
