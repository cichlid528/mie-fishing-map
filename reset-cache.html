<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f7b63">
    <title>釣りマップのキャッシュをリセット</title>
    <style>
      :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17221f; background: #edf4f0; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 18px; }
      main { width: min(560px, 100%); background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 18px 45px rgba(12, 54, 43, .18); }
      h1 { margin: 0 0 10px; font-size: 1.35rem; color: #095a48; }
      p { line-height: 1.65; }
      button, a { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; border-radius: 999px; padding: 0 16px; font-weight: 800; text-decoration: none; }
      button { border: 0; background: #0f7b63; color: #fff; }
      a { background: #e6f4ef; color: #095a48; margin-left: 8px; }
      .status { margin-top: 12px; color: #64736e; font-weight: 700; }
      code { background: #f1f5f3; border-radius: 6px; padding: 2px 5px; }
    </style>
  </head>
  <body>
    <main>
      <h1>釣りマップをリセットします</h1>
      <p>古い地図や古いService Workerキャッシュが残っている場合、このページでアプリ本体の保存データは残したまま、キャッシュだけを削除します。</p>
      <p>釣果・追加した釣り場・写真・背景画像などの <code>localStorage</code> データは削除しません。</p>
      <button id="resetButton" type="button">キャッシュを消して開き直す</button>
      <a href="./?v=v108-title-art-yoshiyuki">そのまま開く</a>
      <p id="status" class="status" aria-live="polite">準備できました。</p>
    </main>
    <script>
      async function resetFishingMap() {
        const status = document.getElementById("status");
        const say = (message) => { status.textContent = message; };
        try {
          say("Service Workerを解除しています…");
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          say("古いキャッシュを削除しています…");
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }

          say("完了しました。最新版を開き直します…");
          const url = new URL("./", location.href);
          url.searchParams.set("v", "v108-title-art-yoshiyuki");
          url.searchParams.set("reset", Date.now().toString());
          setTimeout(() => location.replace(url.toString()), 500);
        } catch (error) {
          say("リセットに失敗しました。ブラウザのサイトデータを削除してから開き直してください。");
        }
      }
      document.getElementById("resetButton").addEventListener("click", resetFishingMap);
      window.addEventListener("load", () => {
        if (location.search.includes("auto=1")) resetFishingMap();
      });
    </script>
  </body>
</html>
