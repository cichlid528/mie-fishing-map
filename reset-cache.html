<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>キャッシュ削除</title><style>body{font-family:system-ui,sans-serif;line-height:1.7;padding:24px;background:#eef8f4;color:#073f33}a,button{display:inline-block;margin:8px 0;padding:12px 16px;border-radius:999px;background:#0f7b63;color:white;text-decoration:none;border:0;font-weight:800}</style></head><body><h1>三重県釣りマップ キャッシュ削除</h1><p>v171-add-spot-button-fix・記録ボタン動作修正版のキャッシュを削除します。</p><p id="status">処理中です…</p><a href="./?v=v171-add-spot-button-fix">アプリを開く</a><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}document.getElementById('status').textContent='キャッシュ削除が完了しました。';if(location.search.includes('auto=1'))setTimeout(()=>location.href='./?v=v171-add-spot-button-fix',900);}catch(e){document.getElementById('status').textContent='キャッシュ削除中にエラーが出ました。手動で再読み込みしてください。';}})();</script></body></html>
